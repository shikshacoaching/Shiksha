<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shiksha Student Portal</title>
  <link rel="icon" href="https://iili.io/qkieRf9.png">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">

  <!-- Loader -->
  <div id="loader" style="display:none;" class="fixed inset-0 bg-gray-900/90 z-[9999] flex flex-col justify-center items-center backdrop-blur-sm">
    <div class="loader-spinner mb-4"></div>
    <h2 id="loader-text" class="text-white text-xl font-semibold">Processing...</h2>
  </div>

  <!-- Birthday Layer -->
  <div id="birthday-balloons" class="balloon-container" style="display:none;"></div>

  <!-- Page 1: Login -->
  <div id="login-page" style="display:none;" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-b from-[#eaf2fc] to-[#dceaf9]">
    <div class="w-full max-w-[420px] flex flex-col items-center">
      <img src="https://iili.io/qkieRf9.png" class="w-20 h-20 rounded-full border-2 border-white bg-white shadow-sm mb-4">
      <h1 class="text-3xl font-extrabold text-[#00004d] font-algerian">Shiksha</h1>
      <p class="text-[10px] font-bold text-[#00004d] uppercase font-comfortaa">A Career Institute of Arts</p>
      
      <div class="bg-white w-full px-8 py-10 rounded-xl shadow-lg mt-6 relative">
        <div class="absolute top-4 right-5 text-center cursor-pointer" onclick="showPage('admin-login-page')">
          <i class="fas fa-university text-gray-700"></i>
          <span class="text-[8px] font-bold block">Admin</span>
        </div>
        <h2 class="text-center font-bold mb-6 text-sm">STUDENT LOGIN</h2>
        <input type="text" id="login-adm" placeholder="Student ID" class="w-full mb-4 p-3 border rounded-lg text-sm">
        <input type="text" id="login-dob" onfocus="(this.type='date')" placeholder="Date of Birth" class="w-full mb-6 p-3 border rounded-lg text-sm">
        <button onclick="requestOTP()" class="w-full bg-[#00004d] text-white p-3 rounded-lg font-bold hover:bg-[#000066]">LOGIN</button>
      </div>
    </div>
  </div>

  <!-- Page 2: OTP -->
  <div id="otp-page" style="display:none;" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-b from-[#eaf2fc] to-[#dceaf9]">
    <div class="bg-white w-full max-w-[400px] p-8 rounded-xl shadow-lg text-center">
      <h2 class="font-bold text-lg mb-2">OTP VERIFICATION</h2>
      <p class="text-xs text-gray-500 mb-6">Code sent to: <span id="display-email" class="font-bold text-blue-900"></span></p>
      <input type="text" id="login-otp" placeholder="Enter 6-digit OTP" class="w-full p-4 border rounded-lg text-center tracking-widest font-bold text-xl mb-4">
      <button onclick="verifyOTP()" class="w-full bg-[#00004d] text-white p-3 rounded-lg font-bold">VERIFY & LOGIN</button>
    </div>
  </div>

  <!-- Page 3: Admin Login -->
  <div id="admin-login-page" style="display:none;" class="min-h-screen flex items-center justify-center p-4 bg-gray-900">
    <div class="bg-gray-800 p-8 rounded-2xl w-full max-w-[350px] shadow-2xl border border-gray-700">
      <button onclick="showPage('login-page')" class="text-gray-400 text-xs mb-4 hover:text-white"><i class="fas fa-arrow-left"></i> Back</button>
      <h2 class="text-white font-bold text-center mb-6">ADMIN SECURE LOGIN</h2>
      <input type="text" id="admin-user" placeholder="Admin ID" class="w-full p-3 mb-4 bg-gray-900 border border-gray-700 rounded text-white">
      <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 mb-6 bg-gray-900 border border-gray-700 rounded text-white">
      <button onclick="attemptAdminLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-500">AUTHENTICATE</button>
    </div>
  </div>

  <!-- DASHBOARDS: Note: Add your original Dashboard HTML here between these placeholders -->
  <div id="student-dashboard" style="display:none;" class="min-h-screen bg-gray-50">
     <!-- PASTE YOUR ORIGINAL STUDENT DASHBOARD HTML HERE -->
     <h1 class="p-4 font-bold">Welcome <span id="s-name-val"></span></h1>
     <button onclick="logout()" class="p-2 bg-red-500 text-white ml-4 rounded">Logout</button>
  </div>

  <div id="admin-dashboard" style="display:none;" class="min-h-screen bg-gray-100">
     <!-- PASTE YOUR ORIGINAL ADMIN DASHBOARD HTML HERE -->
     <h1 class="p-4 font-bold">Admin Portal</h1>
     <button onclick="logout()" class="p-2 bg-red-500 text-white ml-4 rounded">Logout</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
